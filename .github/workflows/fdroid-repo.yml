name: F-Droid Repo

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-repo:
    name: Update F-Droid Repository
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install fdroidserver
        run: |
          sudo apt-get update
          sudo apt-get install -y fdroidserver

      - name: Download latest release APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p docs/fdroid/repo
          gh release download --pattern "*.apk" --dir docs/fdroid/repo/ || echo "No APK found"
          ls -la docs/fdroid/repo/

      - name: Generate F-Droid repo index
        run: |
          cd docs/fdroid

          # Create config
          mkdir -p config
          cat > config.yml << 'CONF'
          repo_url: https://ppapadeas.github.io/opentopo/fdroid/repo
          repo_name: OpenTopo F-Droid Repo
          repo_description: >-
            Open-source GNSS survey app with HEPOS transformation for Greece.
            This is the developer's own F-Droid repository.
          archive_older: 3
          CONF

          # Generate index from APKs
          fdroid update --create-metadata --rename-apks 2>&1 || echo "fdroid update done"
          ls -la repo/

      - name: Commit and push repo index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/fdroid/
          git diff --cached --quiet && echo "No changes" || (git commit -m "Update F-Droid repo index [skip ci]" && git push)

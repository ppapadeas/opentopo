<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1024px;
  height: 500px;
  overflow: hidden;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: linear-gradient(135deg, #003D34 0%, #006B5E 40%, #008573 75%, #00A68A 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  padding-bottom: 16px;
}

/* Subtle grid pattern overlay */
.grid-overlay {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* Decorative crosshair */
.crosshair {
  position: absolute;
  width: 120px;
  height: 120px;
  border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 50%;
  pointer-events: none;
}
.crosshair::before, .crosshair::after {
  content: '';
  position: absolute;
  background: rgba(255,255,255,0.08);
}
.crosshair::before {
  width: 1.5px; height: 150px;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
}
.crosshair::after {
  width: 150px; height: 1.5px;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
}
.crosshair-1 { right: 80px; top: 40px; width: 100px; height: 100px; }
.crosshair-1::before { height: 130px; }
.crosshair-1::after { width: 130px; }
.crosshair-2 { left: 60px; bottom: 50px; width: 80px; height: 80px; opacity: 0.6; }
.crosshair-2::before { height: 110px; }
.crosshair-2::after { width: 110px; }

/* Decorative satellite dots */
.sat-dot {
  position: absolute;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(0, 230, 118, 0.5);
  pointer-events: none;
}
.sat-dot:nth-child(1) { top: 60px; left: 200px; background: rgba(0, 230, 118, 0.4); width: 5px; height: 5px; }
.sat-dot:nth-child(2) { top: 120px; right: 250px; background: rgba(255, 171, 0, 0.4); width: 4px; height: 4px; }
.sat-dot:nth-child(3) { bottom: 90px; right: 180px; background: rgba(68, 138, 255, 0.4); width: 5px; height: 5px; }
.sat-dot:nth-child(4) { top: 80px; right: 400px; background: rgba(0, 230, 118, 0.3); width: 4px; height: 4px; }
.sat-dot:nth-child(5) { bottom: 130px; left: 350px; background: rgba(255, 171, 0, 0.3); width: 3px; height: 3px; }

/* Main content */
.content {
  display: flex;
  align-items: center;
  gap: 48px;
  position: relative;
  z-index: 1;
}

.logo-container {
  flex-shrink: 0;
  width: 200px;
  height: 200px;
  background: rgba(255,255,255,0.1);
  border-radius: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.logo-container svg {
  width: 160px;
  height: 160px;
}

.text-block {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.app-name {
  font-size: 80px;
  font-weight: 700;
  color: white;
  letter-spacing: -2px;
  line-height: 1;
  text-shadow: 0 2px 16px rgba(0,0,0,0.15);
}

.tagline {
  font-size: 24px;
  font-weight: 400;
  color: rgba(255,255,255,0.8);
  letter-spacing: 3px;
  text-transform: uppercase;
  line-height: 1.3;
}

.features {
  display: flex;
  gap: 20px;
  margin-top: 12px;
}
.feature-chip {
  padding: 6px 16px;
  border-radius: 20px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.9);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

/* Corner accent */
.corner-accent {
  position: absolute;
  bottom: 24px;
  right: 32px;
  font-size: 13px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 1px;
  font-weight: 500;
}
</style>
</head>
